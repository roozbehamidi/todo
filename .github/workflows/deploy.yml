name: 🚀 Deploy to Railway

on:
  push:
    branches:
      - main  # می‌تونه هر برنچی باشه که پروژه ازش دیپلوی می‌شه

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v3

      - name: 🧪 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧹 Run Ruff (Linting)
        run: ruff check .
        continue-on-error: true  # تا اگه ایرادی بود فقط هشدار بده، کار متوقف نشه

      - name: 🧪 Run Tests (اختیاری)
        run: pytest
        continue-on-error: true

      - name: ⚙️ Setup Node.js (for Railway CLI)
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 📥 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy to Railway
        run: railway up --service=web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
